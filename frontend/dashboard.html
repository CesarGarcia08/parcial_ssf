<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Notas - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard">
    <header class="header">
      <h1>Mis Notas</h1>
      <div class="user-info">
        <span id="welcomeUser">Hola, usuario</span>
        <button id="logoutBtn" class="btn btn-secondary">Cerrar Sesión</button>
      </div>
    </header>

    <div class="main-content">
      <aside class="sidebar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar notas...">
        </div>

        <div class="categories">
          <h3>Categorías</h3>
          <ul id="categoryList">
            <li><button class="category-btn active" data-category="all">Todas</button></li>
            <li><button class="category-btn" data-category="trabajo">Trabajo</button></li>
            <li><button class="category-btn" data-category="personal">Personal</button></li>
            <li><button class="category-btn" data-category="ideas">Ideas</button></li>
          </ul>
        </div>
      </aside>

      <main class="notes-area">
        <div class="notes-header">
          <h2 id="notesTitle">Todas las notas</h2>
          <button id="addNoteBtn" class="btn btn-primary">+ Nueva Nota</button>
        </div>

        <div id="notesList" class="notes-list">
        </div>
      </main>
    </div>
  </div>

  <div id="noteModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Nueva Nota</h2>

      <form id="noteForm">
        <input type="hidden" id="noteId">

        <div class="form-group">
          <label for="noteTitle">Título</label>
          <input type="text" id="noteTitle" name="noteTitle" required>
        </div>

        <div class="form-group">
          <label for="noteCategory">Categoría</label>
          <select id="noteCategory" name="noteCategory">
            <option value="general">General</option>
            <option value="trabajo">Trabajo</option>
            <option value="personal">Personal</option>
            <option value="ideas">Ideas</option>
          </select>
        </div>

        <div class="form-group">
          <label for="noteContent">Contenido</label>
          <textarea id="noteContent" name="noteContent" rows="10"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="message" class="message hidden"></div>

  <script src="/js/app.js"></script>
</body>
</html>
